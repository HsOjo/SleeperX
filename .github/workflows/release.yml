name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build artifacts without creating a GitHub Release'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: amd64
            runner: macos-15-intel

    env:
      # Use the setup-python interpreter instead of uv-managed CPython,
      # whose static build breaks PyInstaller ("Module object for struct is NULL").
      UV_PYTHON_PREFERENCE: only-system

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build app bundle
        run: uv run python build.py

      - name: Rename zip with arch suffix
        run: |
          for f in dist/*.zip; do
            mv "$f" "${f%.zip}-${{ matrix.arch }}.zip"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Read version
        id: version
        run: |
          echo "version=$(grep -oP "version = '\K[^']+" app/res/const.py)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SleeperX v${{ steps.version.outputs.version }}
          draft: true
          files: artifacts/**/*.zip
          generate_release_notes: true
